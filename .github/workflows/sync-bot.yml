name: Sincronização Base Central

on:
  schedule:
    # Roda a cada 10 minutos apenas de Seg a Sex, entre 06:00 e 21:59 BRT. 
    # (Dividido em duas regras devido à diferença de fuso horário UTC para BRT no fim da noite)
    - cron: '*/10 9-23 * * 1-5' # 06:00 às 20:59 BRT (Seg-Sex)
    - cron: '*/10 0 * * 2-6'    # 21:00 às 21:59 BRT (Noite de Seg-Sex equivale à madrugada de Ter-Sáb no UTC)
  workflow_dispatch: # Permite rodar o workflow manualmente pelo painel do GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth

      - name: Rodar Sync Bot
        env:
          PYTHONUNBUFFERED: 1
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python sync_bot.py
