<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.jpg" type="image/jpeg" />
    <title>SIRTEC - Gestão de Tarefas</title>
    <meta name="description" content="Sistema de Gestão de Tarefas e Rotinas SIRTEC" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Lovable App" />
    <meta property="og:description" content="Lovable Generated Project" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <script>
      window.addEventListener('error', function(event) {
        fetch('http://localhost:9999', {
          method: 'POST',
          body: JSON.stringify({ message: event.message, filename: event.filename, lineno: event.lineno, colno: event.colno, error: event.error?.stack })
        }).catch(e => console.error(e));
      });
      window.addEventListener('unhandledrejection', function(event) {
        fetch('http://localhost:9999', {
          method: 'POST',
          body: JSON.stringify({ message: event.reason?.message, stack: event.reason?.stack })
        }).catch(e => console.error(e));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
